<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-box">
        <h1>Cadastre-se</h1>

        <p>Nome de usuario:</p>
        <input type="text" name="username-input" id="username-input" placeholder="Digite seu nome de usuario">
        <p class="placeholder"></p>

        <p>Endereço de Email: </p>
        <input type="email" name="email-input" id="email-input" placeholder="Digite seu email">
        <p class="placeholder"></p>

        <p>Senha: </p>
        <input type="password" name="password-input" id="password-input" placeholder="Digite sua senha">
        <p class="placeholder"></p>

        <button type="submit">Cadastrar-se</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
